<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class = "title">Online Calculator</h1>
    <div class ="container">
        <div class="text">
            <div id ="textHistory">
            </div>
            <div id="answers">
            </div>
        </div>
        <div class = "buttonContainer">
            <div class = "row5 buttons">
                <button class ="btn"><</button>
                <button class ="btn" id="clear">AC</button>
                <button class ="btn">%</button>
                <button class = "operator btn">/</button>
            </div>
            <div class = "row4 buttons">
                <button class ="btn">7</button>
                <button class ="btn">8</button>
                <button class ="btn">9</button>
                <button class = "operator btn">*</button>
            </div>
            <div class = " row3 buttons">
                <button class ="btn">4</button>
                <button class ="btn">5</button>
                <button class ="btn">6</button>
                <button class = "operator btn" >-</button>
            </div>
            <div class = "row2 buttons">
                <button class ="btn">1</button>
                <button class ="btn">2</button>
                <button class ="btn">3</button>
                <button class = "operator btn">+</button>
            </div>
            <div class = "row1 buttons">
                <button class ="btn">+/-</button>
                <button class ="btn">0</button>
                <button class ="btn">.</button>
                <button class = "operator btn">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
