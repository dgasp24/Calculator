<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class = "title">Online Calculator</h1>
    <div class ="container">
        <div class="text"></div>
        <div class = "buttonContainer">
            <div class = "row5 buttons">
                <button><</button>
                <button>AC</button>
                <button>%</button>
                <button class = "operator">/</button>
            </div>
            <div class = "row4 buttons">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class = "operator">X</button>
            </div>
            <div class = " row3 buttons">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class = "operator" >-</button>
            </div>
            <div class = "row2 buttons">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class = "operator">+</button>
            </div>
            <div class = "row1 buttons">
                <button>+/-</button>
                <button>0</button>
                <button>.</button>
                <button class = "operator">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
